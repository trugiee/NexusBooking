<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # ---- PHP API: Route /api/* to PHP router ----
    <Location "/api">
        SetHandler application/x-httpd-php
        CGIPassAuth On
    </Location>

    # Tell Apache to use php-server/index.php as the PHP router
    RewriteEngine On

    # Pass Authorization header to PHP
    RewriteCond %{HTTP:Authorization} .
    RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

    # Route /api/* requests to PHP router
    RewriteRule ^/api(/.*)?$ /var/www/php-server/index.php [L]

    <Directory "/var/www/php-server">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # ---- SPA Frontend: Serve index.html for all non-API routes ----
    <Directory "/var/www/html">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        # If request is NOT a file and NOT a directory → serve index.html
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteRule ^ /index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
